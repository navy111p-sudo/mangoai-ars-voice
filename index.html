<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>망고아이 ARS 안내</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #FF9800 0%, #FF5722 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: white; border-radius: 24px; padding: 36px 32px; max-width: 440px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.2); text-align: center; }
    .logo { font-size: 48px; margin-bottom: 12px; }
    h1 { color: #333; font-size: 22px; margin-bottom: 6px; }
    .subtitle { color: #888; font-size: 13px; margin-bottom: 24px; }
    .btn-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 8px; }
    .btn { background: linear-gradient(135deg, #FF9800, #FF5722); color: white; border: none; border-radius: 50px; padding: 11px 22px; font-size: 14px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; white-space: nowrap; }
    .btn:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(255,87,34,0.35); }
    .btn.primary { padding: 13px 32px; font-size: 16px; font-weight: bold; }
    .voice-info { background: #FFF8E1; border-radius: 10px; padding: 10px 16px; margin: 14px 0 6px; font-size: 14px; color: #FF5722; font-weight: bold; min-height: 38px; display: flex; align-items: center; justify-content: center; }
    .status { color: #aaa; font-size: 12px; margin: 4px 0 10px; min-height: 18px; }
    .volume-ctrl { display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 13px; color: #999; margin-bottom: 18px; }
    .volume-ctrl input[type=range] { width: 100px; accent-color: #FF9800; }
    .script { text-align: left; background: #FFF8E1; border-radius: 14px; padding: 18px 20px; font-size: 13px; line-height: 1.9; color: #666; }
    .script p { margin-bottom: 4px; }
    .info { color: #bbb; font-size: 11px; margin-top: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">&#127837;</div>
    <h1>망고아이 ARS 안내</h1>
    <p class="subtitle">4가지 목소리 랜덤 재생 + 배경음악</p>
    <div class="btn-group"><button class="btn primary" onclick="playVoice(-1)">&#127922; 랜덤 재생</button></div>
    <div class="btn-group">
      <button class="btn" onclick="playVoice(0)">&#128105; 여자1</button>
      <button class="btn" onclick="playVoice(1)">&#128105; 여자2</button>
      <button class="btn" onclick="playVoice(2)">&#128104; 남자1</button>
      <button class="btn" onclick="playVoice(3)">&#128104; 남자2</button>
    </div>
    <div class="voice-info" id="voiceInfo">버튼을 눌러 재생하세요</div>
    <div class="status" id="status"></div>
    <div class="volume-ctrl"><span>BGM</span><input type="range" id="bgmVol" min="0" max="100" value="25" oninput="updateBGMVol(this.value)"><span id="bgmValLabel">25%</span></div>
    <div class="script">
      <p>안녕하세요, 영상영어 망고아이 입니다.</p>
      <p>상담량이 많아 연결이 지연되고 있습니다.</p>
      <p>빠른 상담을 원하시면 홈페이지 또는 카카오톡으로 문의해 주세요.</p>
      <p>전화를 끊으시면 카카오톡 채널이 자동으로 발송됩니다.</p>
      <p>수업 연기 및 연장은 마이페이지에서 가능합니다.</p>
      <p>잠시만 기다려 주시면 상담사가 연결됩니다.</p>
    </div>
    <div class="info">Powered by GitHub Pages</div>
  </div>
  <script>
    var MP3_URL = 'https://raw.githubusercontent.com/navy111p-sudo/mangoai-ars-voice/main/mangoai-ars-voice.mp3';
    var audioCtx = null, bgmGain = null, cachedBuffer = null;
    var voiceLabels = ['여자1 (밝은 톤)', '여자2 (부드러운 톤)', '남자1 (낮은 톤)', '남자2 (차분한 톤)'];
    var voices = [
      { rate: 1.04, detune: 150 },
      { rate: 0.98, detune: -50 },
      { rate: 0.96, detune: -250 },
      { rate: 0.93, detune: -400 }
    ];
    function createBGM(ctx) {
      var m = ctx.createGain(); m.gain.value = 0.06;
      [261.63, 329.63, 392].forEach(function(f) {
        var o = ctx.createOscillator(); o.type = 'sine'; o.frequency.value = f;
        var g = ctx.createGain(); g.gain.value = 0.3; o.connect(g); g.connect(m); o.start();
        var o2 = ctx.createOscillator(); o2.type = 'sine'; o2.frequency.value = f * 2.003;
        var g2 = ctx.createGain(); g2.gain.value = 0.08; o2.connect(g2); g2.connect(m); o2.start();
      }); return m;
    }
    function playVoice(v) {
      if (audioCtx) { audioCtx.close(); audioCtx = null; }
      var s = document.getElementById('status'), info = document.getElementById('voiceInfo');
      if (v < 0) v = Math.floor(Math.random() * 4);
      info.textContent = voiceLabels[v]; s.textContent = '음성 로딩 중...';
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      var play = function(buf) {
        var src = audioCtx.createBufferSource(); src.buffer = buf;
        src.playbackRate.value = voices[v].rate; src.detune.value = voices[v].detune;
        src.connect(audioCtx.destination); src.start();
        src.onended = function() { if (audioCtx) { audioCtx.close(); audioCtx = null; } s.textContent = '재생 완료'; };
        bgmGain = createBGM(audioCtx); bgmGain.connect(audioCtx.destination);
        updateBGMVol(document.getElementById('bgmVol').value);
        s.textContent = '재생 중... [' + voiceLabels[v] + ']';
      };
      if (cachedBuffer) { play(cachedBuffer); }
      else { fetch(MP3_URL).then(function(r){return r.arrayBuffer()}).then(function(b){return audioCtx.decodeAudioData(b)}).then(function(d){cachedBuffer=d;play(d)}).catch(function(e){s.textContent='오류: '+e.message}); }
    }
    function updateBGMVol(v) { document.getElementById('bgmValLabel').textContent = v + '%'; if (bgmGain) bgmGain.gain.value = (v / 100) * 0.15; }
  </script>
</body>
</html>
