<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>망고아이 ARS 안내</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #FF9800 0%, #FF5722 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      text-align: center;
    }
    .logo { font-size: 48px; margin-bottom: 16px; }
    h1 { color: #333; font-size: 24px; margin-bottom: 8px; }
    .subtitle { color: #666; font-size: 14px; margin-bottom: 24px; }
    audio { width: 100%; margin: 16px 0; }
    .script {
      text-align: left;
      background: #FFF8E1;
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
      font-size: 14px;
      line-height: 1.8;
      color: #555;
    }
    .script p { margin-bottom: 8px; }
    .info { color: #999; font-size: 12px; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">&#127837;</div>
    <h1>망고아이 ARS 안내</h1>
    <p class="subtitle">영상영어 망고아이 상담전화 안내 음성</p>
    <audio controls>
      <source src="mangoai-ars-voice.mp3" type="audio/mpeg">
      브라우저가 오디오를 지원하지 않습니다.
    </audio>
    <div class="script">
      <p>안녕하세요, 영상영어 망고아이 입니다.</p>
      <p>상담량이 많아 연결이 지연되고 있습니다.</p>
      <p>빠른 상담을 원하시면 홈페이지 또는 카카오톡으로 문의해 주세요.</p>
      <p>전화를 끊으시면 카카오톡 채널이 자동으로 발송됩니다.</p>
      <p>수업 연기 및 연장은 마이페이지에서 가능합니다.</p>
      <p>잠시만 기다려 주시면 상담사가 연결됩니다.</p>
    </div>
    <div class="info">Powered by GitHub Pages</div>
  </div>
</body>
</html>
